<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Administrativo - Construtora Premium</title>
    <link rel="stylesheet" href="styles/main.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
        }
        .admin-login-container {
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        .login-header { text-align: center; margin-bottom: 30px; }
        .login-header h1 { color: #2c3e50; margin-bottom: 10px; }
        .login-header p { color: #7f8c8d; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #2c3e50; font-weight: 500; }
        .form-group input {
            width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px;
            font-size: 1rem; outline: none; transition: border-color 0.3s ease;
        }
        .form-group input:focus { border-color: #3498db; }
        .btn-login {
            width: 100%; background: linear-gradient(135deg, #3498db, #2980b9);
            color: white; border: none; padding: 15px; border-radius: 8px;
            font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.3s ease;
        }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(52, 152, 219, 0.4); }
        .btn-login:disabled { opacity: 0.7; cursor: wait; transform: none; }
        .back-link { text-align: center; margin-top: 20px; }
        .back-link a { color: #3498db; text-decoration: none; }
        .back-link a:hover { text-decoration: underline; }
        .login-error { color: #c0392b; font-size: 0.9rem; margin-top: 10px; text-align: center; display: none; }
    </style>
</head>
<body>
    <div class="admin-login-container">
        <div class="login-header">
            <h1><i class="fas fa-shield-alt"></i> Acesso Administrativo</h1>
            <p>Entre com suas credenciais de administrador</p>
        </div>
        <form id="adminLoginForm">
            <div class="form-group">
                <label for="adminEmail">Email:</label>
                <input type="email" id="adminEmail" name="email" required autocomplete="username">
            </div>
            <div class="form-group">
                <label for="adminPassword">Senha:</label>
                <input type="password" id="adminPassword" name="password" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn-login" id="adminLoginBtn">
                <i class="fas fa-sign-in-alt"></i> Entrar
            </button>
            <p class="login-error" id="adminLoginError"></p>
        </form>
        <div class="back-link">
            <a href="index.html">← Voltar ao site</a>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="js/firebase.js"></script>
    <script>
        var ADMIN_ACCOUNTS = [
            { email: 'brunoferreiramarques@gmail.com', name: 'Bruno Marques', role: 'super' },
            { email: 'raphaelmonteirodasilva@yahoo.com.br', name: 'Raphael Monteiro', role: 'comercial' }
        ];
        var FUNCTIONS_BASE = (typeof getCloudFunctionsBaseUrl === 'function') ? getCloudFunctionsBaseUrl() : '';

        function getAdminMeta(email) {
            var e = String(email || '').trim().toLowerCase();
            for (var i = 0; i < ADMIN_ACCOUNTS.length; i++) {
                if (ADMIN_ACCOUNTS[i].email === e) return ADMIN_ACCOUNTS[i];
            }
            return null;
        }

        function showLoginError(msg) {
            var el = document.getElementById('adminLoginError');
            if (el) { el.textContent = msg; el.style.display = msg ? 'block' : 'none'; }
        }

        function saveAdminSession(user, meta) {
            localStorage.setItem('adminUser', JSON.stringify({
                email: meta.email,
                name: meta.name,
                role: meta.role || 'comercial',
                loginTime: new Date().toISOString(),
                authProvider: 'firebase'
            }));
            try { sessionStorage.removeItem('adminSession'); } catch (e) {}
        }

        function authNeedsProvision(err) {
            if (!err || !err.code) return false;
            return err.code === 'auth/user-not-found' ||
                err.code === 'auth/wrong-password' ||
                err.code === 'auth/invalid-credential';
        }

        function formatAuthError(err) {
            if (!err) return 'Não foi possível entrar. Tente novamente.';
            if (err.code === 'auth/too-many-requests') return 'Muitas tentativas. Aguarde alguns minutos e tente novamente.';
            if (err.code === 'auth/invalid-credential' || err.code === 'auth/wrong-password' || err.code === 'auth/user-not-found') {
                return 'Email ou senha incorretos.';
            }
            if (err.message && err.message.indexOf('Firebase:') === 0) return 'Email ou senha incorretos.';
            return err.message || 'Não foi possível entrar. Tente novamente.';
        }

        function provisionAdminAuth(email, password) {
            return fetch(FUNCTIONS_BASE + '/adminProvisionAuth', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ adminEmail: email, adminPassword: password }),
                cache: 'no-store'
            }).then(function(r) { return r.json().then(function(j) { return { ok: r.ok, data: j }; }); });
        }

        document.getElementById('adminLoginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            var email = (document.getElementById('adminEmail').value || '').trim().toLowerCase();
            var password = document.getElementById('adminPassword').value;
            var meta = getAdminMeta(email);
            var btn = document.getElementById('adminLoginBtn');
            showLoginError('');
            if (!meta) {
                showLoginError('Este email não está autorizado como administrador.');
                return;
            }
            if (!firebase || !firebase.auth) {
                showLoginError('Firebase Auth indisponível. Atualize a página.');
                return;
            }
            btn.disabled = true;
            var auth = firebase.auth();

            function tryProvisionAndSignIn(firstErr) {
                if (!authNeedsProvision(firstErr)) throw firstErr;
                return provisionAdminAuth(email, password).then(function(res) {
                    if (!res.ok) throw new Error((res.data && res.data.error) || 'Credenciais inválidas.');
                    return auth.signInWithEmailAndPassword(email, password);
                }).then(function(cred2) {
                    saveAdminSession(cred2.user, meta);
                    window.location.href = 'admin.html?t=' + Date.now();
                });
            }

            auth.signInWithEmailAndPassword(email, password)
                .then(function(cred) {
                    saveAdminSession(cred.user, meta);
                    window.location.href = 'admin.html?t=' + Date.now();
                })
                .catch(function(err) { return tryProvisionAndSignIn(err); })
                .catch(function(err) {
                    showLoginError(formatAuthError(err));
                })
                .finally(function() { btn.disabled = false; });
        });

        if (/[?&]logout=1/.test(window.location.search)) {
            localStorage.removeItem('adminUser');
            try { sessionStorage.removeItem('adminSession'); } catch (e) {}
            if (firebase && firebase.auth) {
                firebase.auth().signOut().catch(function() {});
            }
        }

        if (firebase && firebase.auth) {
            firebase.auth().onAuthStateChanged(function(user) {
                if (!user) return;
                var meta = getAdminMeta(user.email);
                if (meta && localStorage.getItem('adminUser')) {
                    var link = document.createElement('p');
                    link.style.cssText = 'text-align:center;margin-top:12px;font-size:0.9rem;';
                    link.innerHTML = 'Sessão ativa. <a href="admin.html">Entrar no painel</a> &nbsp;|&nbsp; <a href="#" id="switchUser">Trocar de conta</a>';
                    if (!document.getElementById('switchUser')) {
                        document.querySelector('.back-link').parentNode.insertBefore(link, document.querySelector('.back-link'));
                        document.getElementById('switchUser').onclick = function(ev) {
                            ev.preventDefault();
                            firebase.auth().signOut().then(function() {
                                localStorage.removeItem('adminUser');
                                window.location.reload();
                            });
                        };
                    }
                }
            });
        }
    </script>
</body>
</html>
